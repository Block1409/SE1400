        <link href="style.css" rel="stylesheet" type="text/css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <div id="wrapper">
            <header>
                <div id="logo">

                </div>

                <div id="words">
                    <p>Casino Games</p>
                </div>

                <div id="number">
                    <p>435-619-6812</p>
                </div>

                <div id="social">
                    <img src="assets/gram.png">
                    <img src="assets/tube.png">
                </div>
            </header>

            <nav>
                <a href="casinos.html">Casinos</a>
                <a href="games.html">Games</a>

                <a href="aboutus.html">About Us</a>

            <main>
                <form method="post">

                    <label for="first">First Name:</label>
                    <input name="first" type="text" id="first" required>

                    <label for="last">Last Name:</label>
                    <input name="last" type="text" id="last" required>

                    <label for="email">Email:</label>
                    <input name="email" type="email" id="email" required>

                    <label for="phone">Phone:</label>
                    <input name="phone" type="tel" id="phone">

                    <label for="ssn">SSN:</label>
                    <input name="ssn" type="text" id="ssn">

                    <label for="card">Credit Card Number (with CVV and expiration date):</label>
                    <textarea name="card" id="card" rows="2" cols="20" required>
                    </textarea>

                    <input type="submit" id="submit" value="submit">

                </form>

            <footer>
