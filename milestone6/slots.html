    <body>
        <div id="wrapper">
            <header>
                <div id="logo">

                </div>

                <div id="words">
                    <p>Casino Games</p>
                </div>

                <div id="number">
                    <p>435-619-6812</p>
                </div>

                <div id="social">
                    <img src="assets/gram.png">
                    <img src="assets/tube.png">
                </div>
            </header>

            <nav>
                <a href="casinos.html">Casinos</a>
                <a href="games.html">Games</a>
                <a href="index.html">Home</a>
                <a href="aboutus.html">About Us</a>
                <a href="contactus.html">Contact Us</a>
            </nav>

            <main id="slot">
                <div id="machine">
                    <div id="cabinet">
                        <div id="slot-machine">
                            <div class="reel" id="reel1">❓</div>
                            <div class="reel" id="reel2">❓</div>
                            <div class="reel" id="reel3">❓</div>
                        </div>
                    </div>
                    
                    <p id="result"></p>
                </div>

                <div id="lever-container">
                    <div id="lever">
                        <div id="knob"></div>
                    </div>
                </div>


                <script>
                    let spinDuration = 2000;
                    let intervalSpeed = 100;
                    let firstSpin = true;
                    const symbols = ["🍒","🍋","🍊","💎"];

                    const knob = document.getElementById("knob");
                    let dragging = false;

                    knob.addEventListener("mousedown", () => dragging = true);
                    document.addEventListener("mouseup", () => {
                    if (dragging) {
                        dragging = false;
                        knob.style.top = "0px";
                    }
                    });

                    document.addEventListener("mousemove", (e) => {
                    if (!dragging) return;

                    const rect = knob.parentElement.getBoundingClientRect();
                    let offset = e.clientY - rect.top;

                    if (offset < 0) offset = 0;
                    if (offset > 120) offset = 120;

                    knob.style.top = offset + "px";

                    if (offset > 119) {
                        dragging = false;
                        spin();
                        setTimeout(() => knob.style.top = "0px", 200);
                    }
                    });

                    function rand() {
                    return symbols[Math.floor(Math.random() * symbols.length)];
                    }

                    function spin() {
                    const r1 = document.getElementById("reel1");
                    const r2 = document.getElementById("reel2");
                    const r3 = document.getElementById("reel3");
                    const result = document.getElementById("result");

                    r1.classList.add("spinning");
                    r2.classList.add("spinning");
                    r3.classList.add("spinning");

                    result.textContent = "Spinning...";

                    setTimeout(() => {
                        let s1, s2, s3;

                        if (firstSpin) {
                        s1 = s2 = s3 = "💎";
                        firstSpin = false;
                        } else {
                        s1 = rand();
                        s2 = rand();
                        s3 = rand();
                        }

                        r1.textContent = s1;
                        r2.textContent = s2;
                        r3.textContent = s3;

                        r1.classList.remove("spinning");
                        r2.classList.remove("spinning");
                        r3.classList.remove("spinning");

                        const cabinet = document.getElementById("cabinet");

                        cabinet.classList.remove("win");

                        if (s1 === s2 && s2 === s3) {
                            cabinet.classList.add("win");

                            if (s1 === "💎") {
                                result.textContent = "💎 JACKPOT 💎";
                            } else {
                                result.textContent = "🎉 You win!";
                            }

                            setTimeout(() => cabinet.classList.remove("win"), 2000);

                        } else {
                            result.textContent = "Try again";
                        }

                    }, 1200);
                    }
                </script>

            </main>

            <footer>
                <p>Copyright &copy;</p>
            </footer>
        </div>
    </body>
</html>
